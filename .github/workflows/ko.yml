name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - uses: actions/checkout@v7
      - uses: ko-build/setup-ko@v0.9
      - run: |
          tag=$(echo ${{ github.ref }} | cut -c11-)
          ko build -t latest,${tag} --bare