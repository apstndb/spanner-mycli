on:
  push:
    branches:
      - main
      - master
  pull_request:

name: CI

# Cancel superseded runs on the same ref (e.g. new pushes to a PR branch).
# Keep main-branch runs alive so post-merge coverage/sync history is not lost
# when merges land in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Run linting in a separate job for parallel execution
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go version
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.4
          args: --timeout=5m
      # Compile-only guard: tag-gated test files (integration, skip_slow_test)
      # are not built by default and have silently rotted before. This makes
      # them at least compile without wiring them into any test run.
      - name: vet tag-gated test files
        run: go vet -tags integration,skip_slow_test ./...

  # Race detector on unit tests only (short mode, no Docker/emulator needed).
  # The full suite under -race would be too slow for PR feedback.
  race:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go version
      - name: run unit tests with race detector
        run: go test -short -race ./...

  # Go security check using govulncheck.
  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
      - name: run govulncheck
        run: govulncheck ./...

  # Cross-compile check to keep published windows/darwin binaries buildable.
  cross-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

  # Run tests in a separate job for parallel execution
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go version
      - name: run tests with coverage
        run: make test-coverage
      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: tmp/coverage.html
          retention-days: 7
      - uses: k1LoW/octocov-action@v1
        env:
          COVERAGE_ARTIFACT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
