name: README sync

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. new pushes to a PR branch).
# Keep main-branch runs alive so post-merge coverage/sync history is not lost
# when merges land in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  readme-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod

      - name: Install tools
        run: go install tool

      - name: Regenerate README help and docs
        run: make docs-update

      - name: Check generated docs are up to date
        run: git diff --exit-code -- README.md docs/system_variables.md
