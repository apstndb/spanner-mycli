version: 2
# cooldown is a Dependabot version-update option. It does not delay security updates.
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
    groups:
      google-go:
        patterns:
          - "cloud.google.com/*"
          - "google.golang.org/*"
          - "github.com/googleapis/*"
          - "github.com/GoogleCloudPlatform/*"
      golang-x:
        patterns:
          - "golang.org/x/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - "*"
